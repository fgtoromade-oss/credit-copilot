databases:
  - name: credit-copilot-db
    plan: free
    databaseName: credit_copilot
    user: credit_copilot_user

services:
  - type: web
    name: credit-copilot
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: credit-copilot-db
          property: connectionString
